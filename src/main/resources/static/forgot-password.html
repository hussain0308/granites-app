<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Forgot Password</title>

    <link rel="stylesheet" href="/css/style.css" />

    <style>

        body {
            background:
                radial-gradient(circle at top,
                #1f2937,
                #020617);

            color: #e5e7eb;
        }

        .container {
            max-width: 400px;
            margin: 80px auto;
            text-align: center;
        }

        input {

            width: 100%;
            padding: 12px;
            margin: 10px 0;

            border: none;
            border-radius: 10px;
        }

        button {

            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 10px;

            background:
                linear-gradient(
                    135deg,
                    #facc15,
                    #fde68a
                );

            font-weight: bold;

            cursor: pointer;
        }

        #message {
            margin-top: 15px;
        }
		
		.back-btn {
		    width: 100%;
		    padding: 12px;

		    border: none;
		    border-radius: 10px;

		    margin-top: 10px;

		    background: linear-gradient(135deg, #facc15, #fde68a);
		    color: #000;

		    font-weight: bold;
		    cursor: pointer;

		    transition: all 0.3s ease;

		    box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
		}

		.back-btn:hover {
		    transform: translateY(-2px) scale(1.03);

		    box-shadow:
		        0 8px 20px rgba(250, 204, 21, 0.6),
		        0 0 15px rgba(250, 204, 21, 0.5);
		}

		.back-btn:active {
		    transform: scale(0.97);
		    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
		}

    </style>

</head>

<body>

    <div class="container">

        <h2>Forgot Password</h2>

        <input
            type="email"
            id="email"
            placeholder="Enter your email"
        />

        <button onclick="sendOtp()">
            Send OTP
        </button>

        <input
            type="text"
            id="otp"
            placeholder="Enter OTP"
        />

        <button onclick="verifyOtp()">
            Verify OTP
        </button>
		
		<p id="message"></p>

		<p id="timer" style="color:#facc15; font-weight:bold;"></p>

		<button id="resendBtn" onclick="sendOtp()" disabled>
		    Resend OTP
		</button>

        <input
            type="password"
            id="newPassword"
            placeholder="New Password"
        />

        <button onclick="resetPassword()">
            Reset Password
        </button>

        <p id="message"></p>
		
		<button class="back-btn" onclick="goToLogin()">
		    Back to Login
		</button>
    </div>

    <script src="/js/forgot-password.js"></script>

</body>
</html>
