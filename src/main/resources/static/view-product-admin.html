<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Product</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>

    body {
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* =========================
       CONTAINER
    ========================= */
    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
      padding: 30px 0;
    }

    /* =========================
       HEADING
    ========================= */
    h2 {
      text-align: center;
      font-size: 30px;
      letter-spacing: 1px;
      margin-bottom: 20px;

      text-shadow:
        0 3px 8px rgba(0,0,0,0.6),
        0 0 8px rgba(250, 204, 21, 0.4);
    }

    h2::after {
      content: "";
      display: block;
      width: 60%;
      height: 4px;
      margin: 10px auto;
      border-radius: 10px;
      background: linear-gradient(
        90deg,
        #facc15,
        transparent
      );
    }

    /* =========================
       PRODUCT CARD
    ========================= */
    .product-card {

      display: flex;
      flex-wrap: wrap;
      gap: 40px;

      padding: 30px;
      margin-top: 20px;

      background:
        rgba(255,255,255,0.05);

      border-radius: 18px;

      border:
        1px solid rgba(255,255,255,0.08);

      box-shadow:
        0 15px 40px rgba(0,0,0,0.7);
    }

    /* =========================
       LUXURY IMAGE GALLERY
    ========================= */
    .product-gallery {
      width: 340px;
    }

    .main-image-container {

      width: 100%;
      height: 340px;

      overflow: hidden;

      border-radius: 18px;

      border: 1px solid #444;

      background: #111;
    }

    .main-image {

      width: 100%;
      height: 100%;

      object-fit: cover;

      transition:
        transform 0.4s ease;
    }

    .main-image:hover {
      transform: scale(1.12);
    }

    .thumbnail-container {

      display: flex;
      gap: 12px;

      margin-top: 15px;

      flex-wrap: wrap;
    }

    .thumbnail {

      width: 75px;
      height: 75px;

      object-fit: cover;

      border-radius: 10px;

      cursor: pointer;

      border: 2px solid transparent;

      transition: all 0.3s ease;
    }

    .thumbnail:hover {
      transform: scale(1.08);
    }

    .thumbnail.active {

      border-color: #facc15;

      box-shadow:
        0 0 12px rgba(250,204,21,0.8);
    }

    /* =========================
       PRODUCT INFO
    ========================= */
    .product-info {
      flex: 1;
      min-width: 280px;
    }

    .product-info h3 {
      margin-top: 0;
      font-size: 28px;
      color: #facc15;
    }

    .desc {

      margin: 15px 0;

      color: #9ca3af;

      line-height: 1.7;

      font-size: 15px;
    }

    .price {

      font-size: 28px;
      font-weight: bold;

      color: #22c55e;

      margin: 20px 0;
    }

    /* =========================
       BADGES
    ========================= */
    .badge {

      display: inline-block;

      padding: 6px 12px;

      border-radius: 8px;

      font-size: 12px;

      margin-right: 10px;

      margin-bottom: 10px;

      font-weight: bold;
    }

    .category {
      background: #334155;
      color: #e5e7eb;
    }

    .in-stock {
      background: #16a34a;
      color: white;
    }

    .low-stock {
      background: #f59e0b;
      color: black;
    }

    .out-stock {
      background: #dc2626;
      color: white;
    }

    /* =========================
       ACTION BUTTONS
    ========================= */
    .actions {
      margin-top: 25px;
    }

    .btn {

      padding: 12px 22px;

      border-radius: 12px;

      border: none;

      font-weight: bold;

      cursor: pointer;

      margin-right: 12px;

      text-decoration: none;

      display: inline-block;

      transition: 0.3s;
    }

    .cart-btn {

      background:
        linear-gradient(
          45deg,
          #facc15,
          #eab308
        );

      color: #1f2937;
    }

    .cart-btn:hover {

      transform: scale(1.08);

      box-shadow:
        0 8px 20px rgba(250,204,21,0.5);
    }

    .back-btn {

      background: transparent;

      border: 1px solid #facc15;

      color: #facc15;
    }

    .back-btn:hover {
      background: rgba(250,204,21,0.1);
    }

    /* =========================
       FOOTER
    ========================= */
    .footer {
      margin-top: 50px;
      text-align: center;
    }

    .logo {

      font-size: 20px;

      font-weight: bold;

      background:
        linear-gradient(
          90deg,
          #facc15,
          #fde68a
        );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {

      font-size: 13px;

      color: #9ca3af;

      margin-top: 6px;
    }

    /* =========================
       RESPONSIVE
    ========================= */
    @media (max-width: 768px) {

      .product-card {
        flex-direction: column;
      }

      .product-gallery {
        width: 100%;
      }

      .main-image-container {
        height: 300px;
      }
    }
	
	
	/* ================= PRODUCT GALLERY ================= */

	.product-gallery {

	  display: flex;

	  gap: 20px;

	  align-items: flex-start;

	  margin-bottom: 20px;
	}

	/* ================= THUMBNAILS ================= */

	.thumbnail-container {

	  display: flex;

	  flex-direction: column;

	  gap: 12px;
	}

	/* ================= THUMBNAIL IMAGE ================= */

	.thumbnail {

	  width: 80px;

	  height: 80px;

	  object-fit: cover;

	  border-radius: 12px;

	  cursor: pointer;

	  border: 2px solid transparent;

	  transition: 0.3s;

	  background: #111827;
	}

	.thumbnail:hover {

	  transform: scale(1.05);

	  border-color: #facc15;

	  box-shadow:
	    0 0 15px rgba(250,204,21,0.4);
	}

	.thumbnail.active {

	  border-color: #facc15;

	  box-shadow:
	    0 0 18px rgba(250,204,21,0.6);
	}

	/* ================= MAIN IMAGE ================= */

	.main-image-container {

	  flex: 1;

	  max-width: 600px;

	  background:
	    rgba(255,255,255,0.04);

	  border-radius: 18px;

	  overflow: hidden;

	  border:
	    1px solid rgba(255,255,255,0.08);

	  display: flex;

	  justify-content: center;

	  align-items: center;

	  min-height: 500px;
	}

	.main-image {

	  width: 100%;

	  max-height: 500px;

	  object-fit: contain;

	  transition: 0.3s;
	}
	.product-view-wrapper{
	  display:flex;
	  gap:40px;
	  align-items:flex-start;
	  margin-top:30px;
	  flex-wrap:wrap;
	}

	/* LEFT SIDE */
	.gallery-section{
	  display:flex;
	  gap:18px;
	  align-items:flex-start;
	}

	/* THUMBNAILS */
	.thumbnail-container{
	  display:flex;
	  flex-direction:column;
	  gap:12px;
	}

	.thumbnail{
	  width:80px;
	  height:80px;
	  object-fit:cover;
	  border-radius:12px;
	  cursor:pointer;
	  border:2px solid transparent;
	  transition:0.3s ease;
	  background:#111827;
	}

	.thumbnail:hover{
	  transform:scale(1.05);
	  border-color:#facc15;
	}

	.thumbnail.active{
	  border-color:#facc15;
	  box-shadow:0 0 12px rgba(250,204,21,0.6);
	}

	/* MAIN IMAGE */
	.main-image-container{
	  width:500px;
	  height:500px;

	  background:#111827;

	  border-radius:18px;

	  display:flex;
	  align-items:center;
	  justify-content:center;

	  overflow:hidden;

	  box-shadow:
	    0 8px 24px rgba(0,0,0,0.5),
	    0 0 20px rgba(250,204,21,0.08);
	}

	.main-image{
	  width:100%;
	  height:100%;
	  object-fit:contain;
	  transition:0.3s ease;
	}

	/* RIGHT SIDE */
	.product-info{
	  flex:1;
	  min-width:300px;
	}

	.product-title{
	  font-size:34px;
	  margin-bottom:16px;
	  color:#f9fafb;
	}

	.product-description{
	  font-size:16px;
	  line-height:1.7;
	  color:#d1d5db;
	  margin-bottom:24px;
	}

	.product-price{
	  font-size:34px;
	  font-weight:bold;
	  color:#facc15;
	  margin-bottom:24px;
	}

	.product-meta{
	  background:#111827;
	  padding:20px;
	  border-radius:16px;
	  border:1px solid rgba(255,255,255,0.06);
	}

	.product-meta p{
	  margin:10px 0;
	  color:#e5e7eb;
	  font-size:15px;
	}

	/* MOBILE */
	@media(max-width:900px){

	  .product-view-wrapper{
	    flex-direction:column;
	  }

	  .gallery-section{
	    flex-direction:column-reverse;
	    width:100%;
	  }

	  .thumbnail-container{
	    flex-direction:row;
	    flex-wrap:wrap;
	  }

	  .main-image-container{
	    width:100%;
	    height:400px;
	  }
	}

  </style>
</head>

<body>

  <div class="container">

    <h2>🪨 Product Details</h2>

    <!-- PRODUCT DETAILS -->
    <div id="productDetails"></div>

    <!-- BACK BUTTON -->
    <div style="text-align:center; margin-top:25px;">

      <a
        href="/all-products-admin.html"
        class="btn back-btn">

        ← Back to Product List

      </a>

    </div>

    <!-- FOOTER -->
    <div class="footer">

      <div class="logo">
        🪨 DIAMOND GRANITES & TILES
      </div>

      <div class="tagline">
        Premium • Elegant • Durable
      </div>

    </div>

  </div>

  <script src="/js/admin-products.js"></script>

</body>
</html>
