<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Product</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>

    /* =====================================
       PAGE THEME
    ===================================== */
    body {
      background:
        radial-gradient(circle at top,
        #1f2937,
        #020617);

      color: #e5e7eb;
    }

    /* =====================================
       TOP BAR
    ===================================== */
    .top-bar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 25px;
    }

    /* =====================================
       BACK BUTTON
    ===================================== */
    .back-btn {

      padding: 10px 18px;

      border-radius: 10px;

      font-weight: 600;

      border: none;

      cursor: pointer;

      background:
        linear-gradient(
          45deg,
          #facc15,
          #eab308
        );

      color: #1f2937;

      transition: 0.3s;
    }

    .back-btn:hover {

      transform: scale(1.06);

      box-shadow:
        0 8px 22px rgba(250, 204, 21, 0.5);
    }

    /* =====================================
       HEADING
    ===================================== */
    h2 {

      font-size: 28px;

      letter-spacing: 1px;

      text-shadow:
        0 3px 8px rgba(0,0,0,0.6),
        0 0 6px rgba(250, 204, 21, 0.3);
    }

    /* =====================================
       FORM CARD
    ===================================== */
    .form-card {

      background:
        rgba(255,255,255,0.05);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 18px;

      padding: 30px;

      box-shadow:
        0 15px 40px rgba(0,0,0,0.6);

      backdrop-filter: blur(10px);
    }

    /* =====================================
       FORM LAYOUT
    ===================================== */
    form {

      display: flex;

      flex-direction: column;

      align-items: center;

      gap: 14px;
    }

    /* =====================================
       INPUTS
    ===================================== */
    input,
    select,
    textarea {

      width: 100%;

      max-width: 500px;

      padding: 14px 16px;

      border-radius: 12px;

      border:
        1px solid rgba(255,255,255,0.1);

      background:
        rgba(255,255,255,0.06);

      color: white;

      outline: none;

      transition: 0.3s;

      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    input:focus,
    select:focus,
    textarea:focus {

      border-color: #facc15;

      box-shadow:
        0 0 0 3px rgba(250, 204, 21, 0.15),
        0 0 20px rgba(250, 204, 21, 0.2);
    }

    input::placeholder,
    textarea::placeholder {
      color: #9ca3af;
    }

    select {
      appearance: none;
      cursor: pointer;

      background:
        linear-gradient(
          rgba(255,255,255,0.06),
          rgba(255,255,255,0.04)
        );
    }

    select option {
      background: #111827;
      color: white;
    }

    /* =====================================
       FILE INPUT
    ===================================== */
    input[type="file"] {

      padding: 12px;

      cursor: pointer;
    }

    input[type="file"]::file-selector-button {

      background:
        linear-gradient(
          135deg,
          #facc15,
          #fde68a
        );

      border: none;

      padding: 10px 16px;

      border-radius: 10px;

      color: #111827;

      font-weight: bold;

      cursor: pointer;

      margin-right: 12px;

      transition: 0.3s;
    }

    input[type="file"]::file-selector-button:hover {

      box-shadow:
        0 0 18px rgba(250,204,21,0.35);

      transform: scale(1.03);
    }

    /* =====================================
       BUTTONS
    ===================================== */
    button {

      width: 100%;

      max-width: 500px;

      margin-top: 10px;

      padding: 14px;

      border-radius: 12px;

      border: none;

      cursor: pointer;

      font-weight: bold;

      transition: 0.3s;
    }

    /* ADD PRODUCT BUTTON */
    .submit-btn {

      background:
        linear-gradient(
          135deg,
          #facc15,
          #fde68a
        );

      color: #111827;
    }

    .submit-btn:hover {

      transform: translateY(-2px);

      box-shadow:
        0 10px 25px rgba(250,204,21,0.35);
    }

    /* =====================================
       IMAGE SECTION
    ===================================== */
    .image-section {

      width: 100%;

      max-width: 500px;

      margin-top: 10px;
    }

    .section-label {

      display: block;

      margin-bottom: 10px;

      font-size: 14px;

      font-weight: bold;

      color: #facc15;
    }

    .image-row {

      display: flex;

      gap: 10px;

      align-items: center;

      margin-bottom: 12px;
    }

    .image-row input {
      flex: 1;
    }

    /* ADD IMAGE BUTTON */
    .add-image-btn {

      background:
        rgba(250,204,21,0.12);

      border:
        1px solid rgba(250,204,21,0.35);

      color: #facc15;
    }

    .add-image-btn:hover {

      background:
        rgba(250,204,21,0.18);

      box-shadow:
        0 0 18px rgba(250,204,21,0.2);
    }

    /* REMOVE IMAGE BUTTON */
    .remove-image-btn {

      width: auto;

      min-width: 55px;

      padding: 12px;

      margin-top: 0;

      background:
        rgba(239,68,68,0.15);

      border:
        1px solid rgba(239,68,68,0.35);

      color: #f87171;
    }

    .remove-image-btn:hover {

      background:
        rgba(239,68,68,0.22);

      box-shadow:
        0 0 15px rgba(239,68,68,0.2);
    }

    /* =====================================
       IMAGE PREVIEW
    ===================================== */
    .preview-grid {

      width: 100%;

      max-width: 500px;

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(100px, 1fr));

      gap: 12px;

      margin-top: 15px;
    }

    .preview-card {

      position: relative;

      border-radius: 14px;

      overflow: hidden;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
        rgba(255,255,255,0.05);

      height: 100px;
    }

    .preview-card img {

      width: 100%;

      height: 100%;

      object-fit: cover;
    }

    .preview-badge {

      position: absolute;

      top: 8px;

      left: 8px;

      background: #facc15;

      color: #111827;

      padding: 4px 8px;

      border-radius: 20px;

      font-size: 10px;

      font-weight: bold;
    }

    /* =====================================
       MESSAGE
    ===================================== */
    #message {

      margin-top: 18px;

      font-size: 14px;

      font-weight: 500;

      text-align: center;
    }

    /* =====================================
       RESPONSIVE
    ===================================== */
    @media(max-width: 768px) {

      .top-bar {

        flex-direction: column;

        gap: 15px;

        align-items: flex-start;
      }

      .image-row {

        flex-direction: column;
      }

      .remove-image-btn {

        width: 100%;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <div class="top-bar">

      <h2>
        🪨 Add Premium Product
      </h2>

      <button
        class="back-btn"
        onclick="history.back()">

        ← Back

      </button>

    </div>

    <!-- FORM CARD -->
    <div class="form-card">

      <!-- FORM -->
      <form id="addProductForm">

        <!-- PRODUCT NAME -->
        <input
          type="text"
          id="name"
          placeholder="🪨 Product Name"
          required
        />

        <!-- DESCRIPTION -->
        <textarea
          id="description"
          placeholder="📝 Product Description"
          required
        ></textarea>

        <!-- PRICE -->
        <input
          type="number"
          id="price"
          step="0.01"
          placeholder="💰 Price"
          required
        />

        <!-- STOCK -->
        <input
          type="number"
          id="stock"
          placeholder="📦 Available Stock"
          required
        />

        <!-- CATEGORY -->
        <select id="category" required>

          <option value="">
            🏷 Select Product Category
          </option>

          <option value="Granite">
            🪨 Granite
          </option>

          <option value="Flooring Tiles">
            🏠 Flooring Tiles
          </option>

          <option value="Parking Tiles">
            🚗 Parking Tiles
          </option>

          <option value="Kitchen Tiles">
            🍽 Kitchen Tiles
          </option>

          <option value="Bathroom Tiles">
            🚿 Bathroom Tiles
          </option>

          <option value="Pooja Room Tiles">
            🛕 Pooja Room Tiles
          </option>

          <option value="Elevation Tiles">
            🏢 Elevation Tiles
          </option>

          <option value="Border Patti">
            ✨ Border Patti
          </option>

        </select>

        <!-- MAIN IMAGE -->
        <div class="image-section">

          <label class="section-label">
            🌟 Main Product Image
          </label>

          <input
            type="file"
            id="mainImageFile"
            accept="image/*"
          />

        </div>

        <!-- MULTIPLE IMAGES -->
        <div class="image-section">

          <label class="section-label">
            🖼 Gallery Images
          </label>

          <div id="imageInputs">

            <div class="image-row">

              <input
                type="file"
                class="gallery-image-file"
                accept="image/*"
              />

              <button
                type="button"
                class="remove-image-btn"
                onclick="removeImageField(this)">

                ✖

              </button>

            </div>

          </div>

          <button
            type="button"
            class="add-image-btn"
            onclick="addImageField()">

            ➕ Add More Images

          </button>

        </div>

        <!-- IMAGE PREVIEW -->
        <div
          class="preview-grid"
          id="previewGrid">
        </div>

        <!-- SUBMIT -->
        <button
          type="submit"
          class="submit-btn">

          🚀 Add Product

        </button>

      </form>

      <!-- MESSAGE -->
      <p id="message"></p>

    </div>

  </div>

  <script>

    /* ===============================
       ADD MORE IMAGE INPUT
    =============================== */
    function addImageField() {

      const container =
        document.getElementById("imageInputs");

      const row =
        document.createElement("div");

      row.className = "image-row";

      row.innerHTML = `

        <input
          type="file"
          class="gallery-image-file"
          accept="image/*"
        />

        <button
          type="button"
          class="remove-image-btn"
          onclick="removeImageField(this)">

          ✖

        </button>

      `;

      container.appendChild(row);
    }

    /* ===============================
       REMOVE IMAGE INPUT
    =============================== */
    function removeImageField(button) {

      const rows =
        document.querySelectorAll(".image-row");

      if (rows.length === 1) {
        return;
      }

      button.parentElement.remove();
    }

  </script>

  <script src="/js/admin-products.js"></script>

</body>
</html>
