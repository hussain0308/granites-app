<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Products</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>
    .container {
      max-width: 1100px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 26px;
      letter-spacing: 1px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.6);
    }

    .back-btn {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;

      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;

      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }

    .back-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 6px 18px rgba(250, 204, 21, 0.6),
        0 0 12px rgba(250, 204, 21, 0.5);
    }

    /* ================= SEARCH (MATCH USERS STYLE) ================= */

    .search-box {
      margin-bottom: 20px;
      text-align: center;
    }

    .search-box input {
      width: 260px;
      padding: 10px;

      border-radius: 8px;
      border: none;
      outline: none;

      background: #1f2937;
      color: #e5e7eb;

      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);

      transition: 0.25s ease;
    }

    /* 🔥 FOCUS GLOW (like users page) */
    .search-box input:focus {
      box-shadow:
        0 0 10px rgba(250, 204, 21, 0.6),
        inset 0 0 0 1px rgba(250, 204, 21, 0.5);
      transform: scale(1.02);
    }

    /* ================= TABLE ================= */

    #productList {
      margin-top: 20px;
    }

    /* ================= ACTION BUTTONS ================= */

    .action-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      margin: 2px;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
    }

    .view-btn {
      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }

    .view-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgba(250, 204, 21, 0.6);
    }

    .edit-btn {
      background: linear-gradient(135deg, #fde68a, #facc15);
      color: #000;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }

    .edit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgba(250, 204, 21, 0.6);
    }

    .delete-btn {
      background: #ef4444;
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .delete-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgba(239, 68, 68, 0.6);
    }

    /* ================= PAGINATION (FIXED LIKE USERS PAGE) ================= */

    .pagination {
      margin-top: 20px;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .page-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;

      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;
      font-weight: bold;

      transition: 0.3s;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }

    .page-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 6px 18px rgba(250, 204, 21, 0.6),
        0 0 12px rgba(250, 204, 21, 0.5);
    }

    /* 🔥 ACTIVE PAGE FIX */
    .active-page {
      background: #111827 !important;
      color: #facc15 !important;
      border: 1px solid #facc15;
      box-shadow: 0 0 10px rgba(250, 204, 21, 0.8);
    }

    /* Prev/Next visible always like users page */
    .page-info {
      color: #e5e7eb;
      font-weight: bold;
      padding: 0 10px;
    }

    .page-btn:disabled {
      opacity: 1;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
	
	.pagination .page-btn {
	  font-weight: bold;
	}

	.pagination .page-btn:hover:not(:disabled) {
	  transform: scale(1.05);
	  box-shadow: 0 6px 18px rgba(250, 204, 21, 0.6);
	}

  </style>
</head>

<body>
  <div class="container">

    <div class="top-bar">
      <h2>All Products</h2>
	  <button class="back-btn" onclick="goBackToAdminHome()">
	       Back to Admin Home
	  </button>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by ID or Name..."
      />
    </div>

    <!-- PRODUCTS -->
    <div id="productList"></div>

  </div>

  <script src="/js/admin-products.js"></script>
</body>
</html>
