
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Login</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
    }

    /* Header */
    h2 {
      font-size: 26px;
      letter-spacing: 1px;
      text-align: center;

      text-shadow:
        0 3px 8px rgba(0,0,0,0.6),
        0 0 6px rgba(250, 204, 21, 0.4);
    }

    /* Form */
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input {
      width: 100%;
      max-width: 320px;
    }

    button {
      width: 100%;
      max-width: 320px;
      margin-top: 10px;
      font-weight: 600;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    }

    /* Message styling */
    #message {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }

    /* Back button */
	.back-link {
		  display: inline-block;
		  margin-top: 15px;
		  padding: 10px 18px;
		  border-radius: 8px;

		  background: #facc15;   /* 🔥 add solid background */
		  border: none;

		  color: black;          /* text color */

		  font-weight: 600;
		  transition: 0.3s;
		}

	.back-link:hover {
	  background: #fde047;   /* lighter yellow on hover */
	  box-shadow: 0 0 10px rgba(250, 204, 21, 0.6);
	}

    /* Footer branding */
    .footer {
      margin-top: 30px;
      text-align: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;

      background: linear-gradient(90deg, #facc15, #fde68a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 5px;
    }
	
	.forgot-link {

	    color: #facc15;
		color: black; 

	    text-decoration: none;

	    font-size: 14px;

	    transition: 0.3s;
	}

	.forgot-link:hover {

	    color: #fde68a;
		color: black; 

	    text-shadow:
	        0 0 8px rgba(250, 204, 21, 0.7);
	}
  </style>
</head>

<body>

  <div class="container">

    <h2>Customer Login</h2>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
	  <div style="text-align:center; margin-top:10px;">

	      <a
	          href="/forgot-password.html"
	          class="forgot-link"
	      >
	          Forgot Password?
	      </a>

	  </div>
    </form>

    <!-- Message -->
    <p id="message"></p>

    <!-- Back -->
    <div style="text-align:center;">
      <a href="/index.html" class="back-link">Back</a>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="logo"> 🪨 DIAMOND GRANITES & TILES</div>
      <div class="tagline">Premium • Elegant • Durable</div>
    </div>

  </div>

  <script src="/js/auth.js"></script>

</body>
</html>
