<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Collection | Diamond Granites & Tiles</title>

    <link rel="stylesheet" href="/css/style.css">

    <style>

        body{
            background:linear-gradient(-45deg,#0b0c0f,#1a1a1a,#111827,#0f172a);
            color:#fff;
            min-height:100vh;
        }

        .explore-container{
            width:95%;
            max-width:1400px;
            margin:auto;
            padding:30px;
        }

        .explore-title{
            text-align:center;
            font-size:42px;
            color:#facc15;
            margin-bottom:10px;
        }

        .explore-subtitle{
            text-align:center;
            color:#d1d5db;
            margin-bottom:30px;
        }

        .luxury-toolbar{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:30px;
            justify-content:center;
        }

        .luxury-search,
        .luxury-filter{
            padding:12px 15px;
            border-radius:12px;
            border:none;
            min-width:250px;
            background:#111827;
            color:white;
        }

        .product-grid{
            display:grid;
            grid-template-columns:
                repeat(auto-fill,minmax(300px,1fr));
            gap:25px;
        }

        .product-card{
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(250,204,21,0.2);
            border-radius:20px;
            overflow:hidden;
            transition:.3s;
            backdrop-filter:blur(10px);
        }

        .product-card:hover{
            transform:translateY(-6px);
            box-shadow:
                0 10px 30px rgba(250,204,21,.25);
        }

        .image-wrapper{
            position:relative;
            overflow:hidden;
            height:260px;
        }

        .product-img{
            width:100%;
            height:100%;
            object-fit:cover;
            transition:.4s;
            cursor:pointer;
        }

        .image-overlay{
            position:absolute;
            bottom:10px;
            left:10px;
            background:rgba(0,0,0,.7);
            color:#facc15;
            padding:6px 10px;
            border-radius:8px;
        }

        .thumbnail-row{
            display:flex;
            gap:8px;
            padding:10px;
            overflow-x:auto;
        }

        .mini-thumb{
            width:60px;
            height:60px;
            object-fit:cover;
            border-radius:8px;
            cursor:pointer;
            border:2px solid transparent;
        }

        .mini-thumb:hover{
            border-color:#facc15;
        }

        .product-title{
            padding:10px 15px;
            font-size:20px;
            font-weight:bold;
        }

        .product-category{
            padding:0 15px;
            color:#facc15;
        }

        .product-price{
            padding:10px 15px;
            font-size:22px;
            font-weight:bold;
        }

        .product-stock{
            padding:0 15px 15px;
        }

        .product-actions{
            padding:15px;
        }

        .add-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-weight:bold;
            background:
                linear-gradient(45deg,#facc15,#fde68a);
            color:#000;
        }

        .modal-backdrop{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.8);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        .login-modal{
            width:90%;
            max-width:450px;
            background:#111827;
            border-radius:20px;
            padding:30px;
            text-align:center;
            border:1px solid #facc15;
        }

        .modal-buttons{
            margin-top:20px;
            display:flex;
            gap:10px;
        }

        .modal-buttons a{
            flex:1;
            text-decoration:none;
            padding:12px;
            border-radius:10px;
            font-weight:bold;
        }

        .login-btn{
            background:#facc15;
            color:#000;
        }

        .signup-btn{
            background:#374151;
            color:#fff;
        }

        .fullscreen-backdrop{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.95);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:99999;
        }

        .fullscreen-image{
            max-width:90%;
            max-height:90%;
            border-radius:15px;
        }

        .close-fullscreen{
            position:absolute;
            top:20px;
            right:30px;
            font-size:40px;
            cursor:pointer;
            color:white;
        }

    </style>
</head>

<body>

<div class="explore-container">

    <h1 class="explore-title">
        🪨 Explore Collection
    </h1>

    <p class="explore-subtitle">
        Browse premium granites, tiles and luxury finishes
    </p>

    <div id="productList"></div>

</div>

<script src="/js/explore.js"></script>

</body>
</html>
