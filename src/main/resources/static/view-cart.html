<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Cart</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
    }

    h1 {
      text-align: center;
      font-size: 32px;
      letter-spacing: 1.5px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.6),
                   0 0 8px rgba(250, 204, 21, 0.4);
    }

    h1::after {
      content: "";
      display: block;
      width: 60%;
      height: 4px;
      margin: 10px auto;
      border-radius: 10px;
      background: linear-gradient(90deg, #facc15, transparent);
      box-shadow: 0 0 10px rgba(250, 204, 21, 0.6);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .actions button {
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;

      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;

      transition: 0.3s;
      border: none;
    }

    .actions button:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 20px rgba(250,204,21,0.4);
    }

    /* Cart Cards */
    .cart-card {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 15px 0;
      padding: 15px;

      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);

      transition: 0.3s;
    }

    .cart-card:hover {
      transform: translateY(-4px);
      border-color: rgba(250,204,21,0.5);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .cart-img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
    }

    .cart-info {
      flex: 1;
    }

    .cart-info h4 {
      margin: 0;
      color: #facc15;
    }

    #cartTotal {
      text-align: right;
      margin-top: 20px;
      font-size: 20px;
      color: #facc15;
    }

    /* 🔥 PROCEED BUTTON FIXED STYLE */
    #checkoutBtn {
      display: block;
      margin: 25px auto 0;
      padding: 14px 25px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 12px;

      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;
      border: none;

      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 6px 18px rgba(250,204,21,0.3);
    }

    #checkoutBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 25px rgba(250,204,21,0.6);
    }

    .footer {
      margin-top: 40px;
      text-align: center;
    }

    .logo {
      font-size: 18px;
      font-weight: bold;
      color: #facc15;
    }
  </style>
</head>

<body>

  <div class="container wide-container">

    <h1>My Cart</h1>
    <p id="welcomeText"></p>

    <div class="actions">
      <button onclick="goBackToShopping()">Explore Collection</button>
      <button onclick="logout()">Logout</button>
    </div>

    <!-- CART LIST -->
    <div id="cartList"></div>

    <!-- TOTAL -->
    <h3 id="cartTotal"></h3>

    <!-- 🔥 FIXED BUTTON LINK -->
   <button id="checkoutBtn" onclick="checkout()">Proceed to Buy</button>
    <!-- FOOTER -->
    <div class="footer">
      <div class="logo">🪨 DIAMOND GRANITES & TILES	</div>
    </div>

  </div>
  
  <script>
  function testButton() {
    alert("Button is working!");
  }
  </script>

  <script src="/js/customer.js"></script>

</body>
</html>
