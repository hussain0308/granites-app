

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Home</title>
  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 26px;
      letter-spacing: 1px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.6);
    }

    /* BACK BUTTON */
    .back-btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      border: none;

      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;

      transition: 0.3s;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }

    .back-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 6px 18px rgba(250, 204, 21, 0.6),
        0 0 12px rgba(250, 204, 21, 0.5);
    }

    /* ACTION BUTTONS */
    .actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px 0;
    }

    .actions a,
    .actions button {
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;

      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;

      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }

    .actions a:hover,
    .actions button:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow:
        0 8px 20px rgba(250, 204, 21, 0.6),
        0 0 15px rgba(250, 204, 21, 0.5);
    }

    .actions button:active {
      transform: scale(0.97);
    }

   

    /* TEXT */
    #welcomeText {
      text-align: center;
      margin-bottom: 10px;
    }

    #apiResult {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
	
	
	.dashboard-btn {
	  background: linear-gradient(135deg, #facc15, #fde68a);
	  color: #000;
	  padding: 10px 16px;
	  border-radius: 10px;
	  font-weight: bold;
	  text-decoration: none;
	  display: inline-block;

	  box-shadow: 0 4px 12px rgba(250, 204, 21, 0.4);
	  transition: all 0.3s ease;
	}

	.dashboard-btn:hover {
	  transform: scale(1.06);
	  box-shadow:
	    0 6px 18px rgba(250, 204, 21, 0.7),
	    0 0 14px rgba(250, 204, 21, 0.5);
	}
	
	
	.notification-container {
	    position: relative;
	}

	.notification-btn {
	    position: relative;
	    background: none;
	    border: none;
	    font-size: 22px;
	    cursor: pointer;
	    color: #ffd700;
	}

	

	#notificationDropdown {
	    position: absolute;
	    right: 0;
	    top: 40px;
	    width: 300px;
	    background: #1e1e1e;
	    border-radius: 10px;
	    padding: 10px;
	    display: none;
	    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
	}

	.notification-item {
	    padding: 10px;
	    border-bottom: 1px solid #333;
	    color: white;
	}
	
	#notificationDropdown {
	    z-index: 9999;
	}
	
	
  </style>
</head>

<body>
  <div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">
      <h1>Admin Dashboard</h1>
      
    </div>

    <p id="welcomeText"></p>

    <!-- ACTIONS -->
    <div class="actions">
      <a href="/add-product.html">➕ Add Product</a>
      <a href="/all-products-admin.html">📦 View Products</a>

      <!-- ⭐ NEW FEATURE -->
      <a href="/admin-users.html">👥 Manage Users</a>
	  
	  <a href="/admin-dashboard.html" class="admin-btn dashboard-btn">
	    📊 Business Insights
	  </a>
	  
	  <div class="notification-container">

		<a href="/admin-orders.html" class="admin-btn dashboard-btn">
		  🛒 Orders
		</a>

	  </div>
	  
      <button onclick="logout()">🚪 Logout</button>
    </div>

    <hr />

	
  </div>
  <script src="/js/admin.js"></script>
</body>
</html>
