<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Manage Users</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
    }

    h2 {
      text-align: center;
      font-size: 26px;
      letter-spacing: 1px;
      margin-bottom: 20px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.6);
    }

    table {
      width: 95%;
      margin: auto;
      border-collapse: collapse;
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    th {
      background: #111827;
      padding: 12px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    td {
      padding: 12px;
      text-align: center;
      font-size: 14px;
    }

    tr:nth-child(even) {
      background: #374151;
    }

    tr:hover {
      background: rgba(250, 204, 21, 0.1);
      transition: 0.2s;
    }

    /* Buttons */
    button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
    }

    .delete-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(239, 68, 68, 0.6);
    }

    .update-btn {
      background: linear-gradient(135deg, #facc15, #fde68a);
      color: #000;
    }

    .update-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(250, 204, 21, 0.6);
    }

    /* Top buttons */
    .top-actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

	.back-btn {
	  padding: 10px 18px;
	  border-radius: 10px;
	  border: none;
	  cursor: pointer;
	  font-weight: bold;

	  background: linear-gradient(135deg, #facc15, #fde68a);
	  color: #000;

	  transition: all 0.3s ease;
	  box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
	}

	.back-btn:hover {
	  transform: scale(1.05);
	  box-shadow:
	    0 6px 18px rgba(250, 204, 21, 0.6),
	    0 0 12px rgba(250, 204, 21, 0.5);
	}
	.back-btn:active {
	  transform: scale(0.97);
	}
	
	.search-box {
	  margin-bottom: 20px;
	  display: flex;
	  gap: 10px;
	  justify-content: center;
	}

	.search-box input {
	  padding: 10px;
	  border-radius: 8px;
	  border: none;
	  width: 200px;
	}

	.search-box button {
	  padding: 10px 16px;
	  border-radius: 8px;
	  border: none;
	  font-weight: bold;
	  cursor: pointer;

	  background: linear-gradient(135deg, #facc15, #fde68a);
	  color: #000;

	  transition: 0.3s;
	}

	.search-box button:hover {
	  transform: scale(1.05);
	}
	
	.search-box {
	  margin-bottom: 20px;
	  text-align: center;
	}

	.search-box input {
	  width: 260px;
	  padding: 10px;
	  border-radius: 8px;
	  border: none;
	}

	.pagination {
	  margin-top: 20px;
	  text-align: center;
	}

	.pagination button {
	  padding: 8px 14px;
	  margin: 0 5px;
	  border-radius: 8px;
	  border: none;
	  cursor: pointer;

	  background: linear-gradient(135deg, #facc15, #fde68a);
	  color: #000;
	  font-weight: bold;
	}

	.pagination span {
	  font-weight: bold;
	}
	
	
  </style>
</head>

<body>

  <div class="container">

    <h2>👨‍💼 Manage Users</h2>

    <div class="top-actions">
      <button class="back-btn" onclick="goBack()">Back</button>
    </div>
	
	
	
	<div class="search-box">
	  <input 
	    type="text" 
	    id="searchInput" 
	    placeholder="Search by ID or Username..."
	    oninput="handleSearch()" 
	  />
	</div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Username</th>
          <th>Role</th>
          <th>Email</th>
          <th>Address</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="userTable">
        <!-- Dynamic Data -->
      </tbody>
    </table>
	
	<div class="pagination">
	  <button onclick="prevPage()">Prev</button>
	  <span id="pageInfo"></span>
	  <button onclick="nextPage()">Next</button>
	</div>

  </div>

  <script src="/js/admin-users.js"></script>

</body>
</html>
