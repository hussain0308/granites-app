
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>

  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      align-items: center;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
    }

    h2 {
      font-size: 28px;
      letter-spacing: 1px;
      margin-bottom: 20px;

      text-shadow:
        0 3px 8px rgba(0,0,0,0.6),
        0 0 6px rgba(250, 204, 21, 0.3);
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input {
      width: 100%;
      max-width: 300px;
    }

    button {
      width: 100%;
      max-width: 300px;
      margin-top: 10px;
    }

    /* MESSAGE STYLE */
    #message {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 500;
      color: #f87171;
    }

    /* ✅ UPDATED BACK BUTTON */
	.back-link {
	  display: inline-block;
	  margin-top: 15px;
	  padding: 10px 18px;
	  border-radius: 8px;

	  background: #facc15;   /* 🔥 add solid background */
	  border: none;

	  color: black;          /* text color */

	  font-weight: 600;
	  transition: 0.3s;
	}

	.back-link:hover {
	  background: #fde047;   /* lighter yellow on hover */
	  box-shadow: 0 0 10px rgba(250, 204, 21, 0.6);
	}
  </style>
</head>

<body>
  <div class="container">

    <h2>Admin Login</h2>

    <form id="adminLoginForm">
      <input type="text" id="username" placeholder="Admin Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p id="message"></p>

    <!-- ✅ APPLY CLASS HERE -->
    <a href="/index.html" class="back-link">Back</a>

  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
